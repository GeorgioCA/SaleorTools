
services:
  storefront:
    image: ghcr.io/saleor/storefront:latest
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SALEOR_API_URL: https://api.eatforkish.com/graphql/
      NEXT_PUBLIC_STOREFRONT_URL: https://store.eatforkish.com
      NEXT_PUBLIC_DEFAULT_CHANNEL: default-channel
    labels:
      - coolify.managed=true
      - coolify.routing.enabled=true
      - coolify.routing.entrypoint=websecure
      - coolify.routing.host=store.eatforkish.com
      - coolify.routing.port=3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
