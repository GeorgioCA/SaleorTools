
services:
  search:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SALEOR_API_URL: https://api.eatforkish.com/graphql/
      APP_URL: https://search.eatforkish.com
      ALLOWED_DOMAIN_PATTERN: "example\\.com"
      APL: file
      APP_LOG_LEVEL: info
      ALGOLIA_APPLICATION_ID: ${ALGOLIA_APPLICATION_ID}
      ALGOLIA_SEARCH_API_KEY: ${ALGOLIA_SEARCH_API_KEY}
      ALGOLIA_ADMIN_API_KEY: ${ALGOLIA_ADMIN_API_KEY}
      ALGOLIA_INDEX_PREFIX: ${ALGOLIA_INDEX_PREFIX:-}
    labels:
      - coolify.managed=true
      - coolify.routing.enabled=true
      - coolify.routing.entrypoint=websecure
      - coolify.routing.host=search.eatforkish.com
      - coolify.routing.port=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
