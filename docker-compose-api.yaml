
services:
  api:
    image: ghcr.io/saleor/saleor:3.22
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      DASHBOARD_URL: https://dashboard.eatforkish.com/
      ALLOWED_HOSTS: api.eatforkish.com,localhost,127.0.0.1
      ALLOWED_CLIENT_HOSTS: store.eatforkish.com,localhost,127.0.0.1
      DATABASE_URL: postgres://saleor:saleor@db:5432/saleor
      PUBLIC_URL: https://api.eatforkish.com
      REDIS_URL: redis://cache:6379/1
    labels:
      - coolify.managed=true
      - coolify.routing.enabled=true
      - coolify.routing.entrypoint=websecure
      - coolify.routing.host=api.eatforkish.com
      - coolify.routing.port=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - saleor-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: saleor
      POSTGRES_PASSWORD: saleor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saleor"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: valkey/valkey:8.1-alpine
    restart: unless-stopped
    volumes:
      - saleor-cache:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/saleor/saleor:3.22
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    env_file:
      - common.env
      - backend.env
    depends_on:
      cache:
        condition: service_healthy
    volumes:
      - saleor-media:/app/media
    environment:
      DATABASE_URL: postgres://saleor:saleor@db:5432/saleor
      REDIS_URL: redis://cache:6379/1
    healthcheck:
      test: ["CMD", "celery", "-A", "saleor", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  jaeger:
    image: jaegertracing/jaeger
    restart: unless-stopped
    volumes:
      - type: tmpfs
        target: /tmp
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  saleor-db:
  saleor-cache:
  saleor-media:
